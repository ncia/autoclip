version: '3.8'

services:
  db:
    image: postgres:15
    container_name: autoclip_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aiclip
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: autoclip_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build: ./backend
    container_name: autoclip_backend
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/aiclip
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: always

  celery_worker:
    build: ./backend
    container_name: autoclip_celery_worker
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/aiclip
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: always

  celery_beat:
    build: ./backend
    container_name: autoclip_celery_beat
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/aiclip
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build: ./frontend
    container_name: autoclip_frontend
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: autoclip_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  postgres_data:
  redis_data:
